services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: careerpath
      POSTGRES_PASSWORD: careerpath
      POSTGRES_DB: careerpath
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careerpath -d careerpath"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://careerpath:careerpath@db:5432/careerpath
      JWT_SECRET_KEY: dev-only-secret-936f2a1c8b7e4d5f9a0c1b2e3d4f5a6b
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic

volumes:
  postgres_data:
